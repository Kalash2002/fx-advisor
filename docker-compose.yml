  #     MYSQL_URL: jdbc:mysql://mysql:3306/fxadvisor_app?useSSL=false&allowPublicKeyRetrieval=true
  #     MYSQL_USERNAME: fxuser
  #     MYSQL_PASSWORD: fxpass
  #     POSTGRES_URL: jdbc:postgresql://postgres:5432/fxadvisor_vectors
  #     POSTGRES_USERNAME: vecuser
  #     POSTGRES_PASSWORD: vecpass
  #     REDIS_HOST: redis
  #     OPENAI_API_KEY: ${OPENAI_API_KEY}
