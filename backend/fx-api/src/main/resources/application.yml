spring:
  application:
    name: fx-advisor

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration

  datasource:
    url: jdbc:mysql://localhost:3307/fxadvisor_app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: fxuser
    password: fxpass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      pool-name: MySQLPool

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/mysql
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

  ai:
    openai:
      api-key: ${GROQ_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: ${FX_GROQ_MODEL:llama-3.3-70b-versatile}
          temperature: 0.1
          max-tokens: 2000

fx:
  llm:
    provider: ${FX_LLM_PROVIDER:openai}

postgres:
  datasource:
    url: jdbc:postgresql://localhost:5432/fxadvisor_vectors
    username: vecuser
    password: vecpass

jwt:
  secret: dev-secret-change-in-production-must-be-256bit-xyz
  access-token-expiry-ms: 900000
  refresh-token-expiry-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

server:
  port: 8080

logging:
  level:
    com.fxadvisor: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
    org.springframework.ai: DEBUG
    org.springframework.ai.chat.client: TRACE